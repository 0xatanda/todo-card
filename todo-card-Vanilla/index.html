<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Todo Card</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<article data-testid="test-todo-card" class="card">

  <!-- ===== CHECKBOX ===== -->
  <div class="row">
    <input type="checkbox" id="toggle" data-testid="test-todo-complete-toggle" />
    <label for="toggle">Mark as completed</label>
  </div>

  <!-- ===== VIEW MODE ===== -->
  <div id="view-mode">

    <div class="header">
      <h2 data-testid="test-todo-title" id="title">Design Landing Page</h2>

      <span
        data-testid="test-todo-priority-indicator"
        id="priority-indicator"
        class="priority high"
      >
        High
      </span>
    </div>

    <p data-testid="test-todo-description" id="description">
      Create a modern UI with clean layout, responsive structure and proper spacing.
    </p>

    <div
      data-testid="test-todo-collapsible-section"
      id="collapsible"
      class="collapsed"
    >
      <p id="full-text">
        Extended description: This section contains additional details that can be expanded or collapsed based on user interaction.
      </p>
    </div>

    <button
      data-testid="test-todo-expand-toggle"
      id="expandBtn"
      aria-expanded="false"
      aria-controls="collapsible"
    >
      Expand
    </button>

    <div>
      <strong data-testid="test-todo-priority">High</strong>
    </div>

    <select data-testid="test-todo-status-control" id="status">
      <option>Pending</option>
      <option>In Progress</option>
      <option>Done</option>
    </select>

    <span data-testid="test-todo-status" id="statusText">Pending</span>

    <time data-testid="test-todo-due-date" id="dueDate"></time>

    <div data-testid="test-todo-time-remaining" id="timeRemaining"></div>

    <div data-testid="test-todo-overdue-indicator" id="overdue"></div>

    <!-- TAGS -->
    <ul data-testid="test-todo-tags">
      <li data-testid="test-todo-tag-work">work</li>
      <li data-testid="test-todo-tag-urgent">urgent</li>
      <li>design</li>
    </ul>

    <!-- ACTIONS -->
    <div class="actions">
      <button data-testid="test-todo-edit-button" id="editBtn">Edit</button>
      <button data-testid="test-todo-delete-button" id="deleteBtn">Delete</button>
    </div>

  </div>

  <!-- ===== EDIT MODE ===== -->
  <form data-testid="test-todo-edit-form" id="editForm" hidden>

    <label for="editTitle">Title</label>
    <input id="editTitle" data-testid="test-todo-edit-title-input" />

    <label for="editDesc">Description</label>
    <textarea id="editDesc" data-testid="test-todo-edit-description-input"></textarea>

    <label for="editPriority">Priority</label>
    <select id="editPriority" data-testid="test-todo-edit-priority-select">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <label for="editDue">Due Date</label>
    <input type="datetime-local" id="editDue" data-testid="test-todo-edit-due-date-input" />

    <button type="submit" data-testid="test-todo-save-button">Save</button>
    <button type="button" data-testid="test-todo-cancel-button" id="cancelBtn">Cancel</button>

  </form>

</article>

<script src="script.js"></script>
</body>
</html>
